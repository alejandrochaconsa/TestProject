<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>File & Directory Explorer</title>
</head>

<body>
    <!-- 
    Main functionality:
    List items (Name, total items, total size)
    Click items to move forward
    Go backwards
    
    Search in every level
    Upload in every level
    Download in every level -->

    <h1>File & Directory Explorer</h1>
    <br>
    <div><b>Breadcrumbs:</b> <span id="breadcrumbs"></span></div>
    <br>
    <div>
        <br>
        <input id="search-input" placeholder="e.g. SearchForFile" />
        <button id="search-button">Search</button>
        <button id="clear-button">Clear</button>
        <br>
    </div>
    <br>
    <table>
        <thead>
            <tr> 
                <th>Item Name</th>
                <th>Item Type</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="item-list"></tbody>
    </table>
    <br>
    <div id="items-info">
        <b>Items Shown:</b> <span id="items-shown"></span><br>
        <b>Total File Size:</b> <span id="total-size"></span> KB
    </div>
    <br>
    <br>
    <h4>Upload File</h4>
    <input id="upload-file-input" type="file">
    <br>
    <button id="upload-button">Upload</button>

    <script type="text/javascript" src="items.js"></script>
</body>

</html>
