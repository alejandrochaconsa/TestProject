<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>File & Directory Explorer</title>
</head>

<body>
    <!-- 
    Main functionality:
    List items (Name, total items, total size)
    Click items to move forward
    Go backwards
    
    Search in every level
    Upload in every level
    Download in every level -->

    <h1>File & Directory Explorer</h1>

    <div>
        <input placeholder="Search" />
        <button>Upload</button>
    </div>
    <br>
    <table>
        <thead>
            <th>Item Name</th>
            <th>Item Type</th>
            <th>Actions</th>
        </thead>
        <tbody id="item-list"></tbody>
    </table>
    <br>
    <div id="items-info">
        Items Shown: <span id="items-shown"></span><br>
        Total File Size: <span id="total-size"></span> KB
    </div>

    <script type="text/javascript" src="items.js"></script>
</body>

</html>
